# Backend — FastAPI，无状态，2 副本展示跨节点调度
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: talentflow
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: talentflow
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/yzalx11/talentflow-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MYSQL_SERVER
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: mysql-server
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: mysql-user
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: mysql-database
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: talentflow-secrets
                  key: mysql-root-password
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: redis-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: talentflow-secrets
                  key: openai-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: talentflow-secrets
                  key: jwt-secret-key
          volumeMounts:
            - name: models
              mountPath: /app/data/models
              readOnly: true
            - name: uploads
              mountPath: /app/data/uploads
          readinessProbe:
            httpGet:
              path: /api/v1/docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/docs
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: models
          hostPath:
            path: /opt/models
            type: DirectoryOrCreate
        - name: uploads
          hostPath:
            path: /opt/talentflow/uploads
            type: DirectoryOrCreate
