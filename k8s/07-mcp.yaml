# MCP Server — 单副本 + Service
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: talentflow
  labels:
    app: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: talentflow
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: mcp-server
          image: crpi-uv9n8o05oa9eehhh.cn-guangzhou.personal.cr.aliyuncs.com/talentflowai/mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: MYSQL_SERVER
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: mysql-server
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: talentflow-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: mysql-database
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: redis-url
            - name: BACKEND_HOST
              valueFrom:
                configMapKeyRef:
                  name: talentflow-config
                  key: backend-host
