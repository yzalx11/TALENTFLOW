# Frontend — Nginx + Vue，hostPort 直接绑宿主机端口，与 Compose 对齐
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: talentflow
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: talentflow
  labels:
    app: frontend
spec:
  replicas: 1     # hostPort 只能一个 Pod 绑一个端口
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/yzalx11/talentflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              hostPort: 8893     # 直接绑宿主机 8893，跟云转发对齐
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
