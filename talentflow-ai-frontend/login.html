<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS RAG - 用户认证</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 380px;
            transition: all 0.3s ease;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* 修复宽度问题 */
            font-size: 14px;
        }
        .form-group input:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #5a6fd6; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .switch-text { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .switch-text a { color: #667eea; text-decoration: none; cursor: pointer; }
        .switch-text a:hover { text-decoration: underline; }
        .error-msg { color: #ff4d4f; text-align: center; margin-top: 10px; font-size: 13px; }
        .success-msg { color: #52c41a; text-align: center; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div id="app" class="auth-container">
    <!-- 登录视图 -->
    <div v-if="isLogin">
        <h2>欢迎回来</h2>
        <form @submit.prevent="handleLogin">
            <div class="form-group">
                <label>账号</label>
                <input type="text" v-model="loginForm.username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" v-model="loginForm.password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn" :disabled="loading">
                {{ loading ? '登录中...' : '登 录' }}
            </button>
        </form>
        <div class="switch-text">
            还没有账号？ <a @click="toggleMode">立即注册</a>
        </div>
    </div>

    <!-- 注册视图 -->
    <div v-else>
        <h2>创建新账号</h2>
        <form @submit.prevent="handleRegister">
            <div class="form-group">
                <label>租户名称 (公司名)</label>
                <input type="text" v-model="registerForm.tenant_name" placeholder="例如：极客科技" required>
            </div>
            <div class="form-group">
                <label>账号</label>
                <input type="text" v-model="registerForm.username" placeholder="设置用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" v-model="registerForm.password" placeholder="设置密码" required>
            </div>
            <button type="submit" class="btn" :disabled="loading">
                {{ loading ? '注册中...' : '注 册' }}
            </button>
        </form>
        <div class="switch-text">
            已有账号？ <a @click="toggleMode">立即登录</a>
        </div>
    </div>

    <!-- 消息提示 -->
    <div v-if="message" :class="messageClass">{{ message }}</div>
</div>

<script>
    const { createApp } = Vue;
    const API_BASE = 'http://127.0.0.1:8000/api/v1/auth';

    createApp({
        data() {
            return {
                isLogin: true,
                loading: false,
                message: '',
                messageType: '', // 'error' or 'success'
                loginForm: { username: '', password: '' },
                registerForm: { username: '', password: '', tenant_name: '' }
            }
        },
        computed: {
            messageClass() {
                return this.messageType === 'error' ? 'error-msg' : 'success-msg';
            }
        },
        methods: {
            toggleMode() {
                this.isLogin = !this.isLogin;
                this.message = '';
            },
            async handleLogin() {
                this.loading = true;
                this.message = '';
                try {
                    const response = await axios.post(`${API_BASE}/login`, this.loginForm);
                    if (response.data.status === 'success') {
                        // 保存用户信息到本地存储
                        const userInfo = response.data;
                        localStorage.setItem('user_info', JSON.stringify(userInfo));
                        
                        this.message = '登录成功！正在跳转...';
                        this.messageType = 'success';
                        
                        // 模拟跳转
                        setTimeout(() => {
                            // window.location.href = '/chat.html'; // 实际跳转
                            alert(`登录成功！\n租户ID: ${userInfo.tenant_id}\nAPI Key: ${userInfo.api_key}`);
                        }, 1000);
                    }
                } catch (error) {
                    this.message = error.response?.data?.detail || '登录失败';
                    this.messageType = 'error';
                } finally {
                    this.loading = false;
                }
            },
            async handleRegister() {
                this.loading = true;
                this.message = '';
                try {
                    const response = await axios.post(`${API_BASE}/register`, this.registerForm);
                    if (response.data.status === 'success') {
                        this.message = '注册成功！即将跳转至登录...';
                        this.messageType = 'success';
                        // 清空表单
                        this.registerForm = { username: '', password: '', tenant_name: '' };
                        setTimeout(() => {
                            this.isLogin = true;
                        }, 1500);
                    }
                } catch (error) {
                    this.message = error.response?.data?.detail || '注册失败';
                    this.messageType = 'error';
                } finally {
                    this.loading = false;
                }
            },
            async handleLogout() {
                try {
                    await axios.post(`${API_BASE}/logout`);
                    localStorage.removeItem('user_info');
                    alert('已退出登录');
                } catch (e) {
                    console.error(e);
                }
            }
        }
    }).mount('#app');
</script>

</body>
</html>
