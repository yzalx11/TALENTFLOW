name: Deploy to Server

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/talentflow-backend:latest

      - name: Build & Push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/talentflow-worker:latest

      - name: Build & Push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile.mcp
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/talentflow-mcp:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-frontend
          file: ./talentflow-ai-frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/talentflow-frontend:latest

      - name: Deploy to Server (K8s)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 30s
          command_timeout: 15m
          script: |
            cd /home/talentflow-ai
            git pull origin master
            kubectl apply -f k8s/
            kubectl rollout status deployment/backend -n talentflow --timeout=120s
            kubectl rollout status deployment/frontend -n talentflow --timeout=60s
            kubectl get pods -n talentflow -o wide
