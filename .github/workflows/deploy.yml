name: Deploy to Server

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login crpi-uv9n8o05oa9eehhh.cn-guangzhou.personal.cr.aliyuncs.com --username="${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/backend:latest
            ${{ secrets.ACR_REGISTRY }}/backend:${{ steps.vars.outputs.short_sha }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/worker:latest
            ${{ secrets.ACR_REGISTRY }}/worker:${{ steps.vars.outputs.short_sha }}

      - name: Build and Push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile.mcp
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/mcp:latest
            ${{ secrets.ACR_REGISTRY }}/mcp:${{ steps.vars.outputs.short_sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-frontend
          file: ./talentflow-ai-frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/frontend:latest
            ${{ secrets.ACR_REGISTRY }}/frontend:${{ steps.vars.outputs.short_sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 30s
          command_timeout: 15m
          script: |
            TAG=${{ needs.build-and-push.outputs.short_sha }}
            cd /home/talentflow-ai/k8s/
            sed -i "/image:/s/:[^:]*$/:${TAG}/" 05-backend.yaml 06-worker.yaml 07-mcp.yaml 08-frontend.yaml
            k3s kubectl apply -f .
            k3s kubectl rollout status deployment/backend -n talentflow --timeout=600s
            k3s kubectl rollout status deployment/frontend -n talentflow --timeout=600s
            k3s kubectl rollout status deployment/worker -n talentflow --timeout=600s
            k3s kubectl rollout status deployment/mcp-server -n talentflow --timeout=600s
            k3s kubectl get pods -n talentflow -o wide
