name: Deploy to Server

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/talentflow-backend:latest
            ghcr.io/${{ github.repository_owner }}/talentflow-backend:${{ steps.vars.outputs.short_sha }}

      - name: Build & Push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/talentflow-worker:latest
            ghcr.io/${{ github.repository_owner }}/talentflow-worker:${{ steps.vars.outputs.short_sha }}

      - name: Build & Push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/talentflow-mcp:latest
            ghcr.io/${{ github.repository_owner }}/talentflow-mcp:${{ steps.vars.outputs.short_sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-frontend
          file: ./talentflow-ai-frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/talentflow-frontend:latest
            ghcr.io/${{ github.repository_owner }}/talentflow-frontend:${{ steps.vars.outputs.short_sha }}

      - name: Deploy (K8s)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 30s
          command_timeout: 15m
          script: |
            TAG=${{ steps.vars.outputs.short_sha }}
            # 首次部署时取消下面这行注释：kubectl apply -f /home/talentflow-ai/k8s/
            # 日常更新只改镜像版本（精准追踪+回滚）
            kubectl set image deployment/backend    backend=ghcr.io/${{ github.repository_owner }}/talentflow-backend:${TAG}    -n talentflow
            kubectl set image deployment/worker     worker=ghcr.io/${{ github.repository_owner }}/talentflow-worker:${TAG}      -n talentflow
            kubectl set image deployment/mcp-server mcp-server=ghcr.io/${{ github.repository_owner }}/talentflow-mcp:${TAG}    -n talentflow
            kubectl set image deployment/frontend   frontend=ghcr.io/${{ github.repository_owner }}/talentflow-frontend:${TAG}  -n talentflow
            kubectl rollout status deployment/backend  -n talentflow --timeout=600s
            kubectl rollout status deployment/frontend -n talentflow --timeout=600s
            kubectl rollout status deployment/worker   -n talentflow --timeout=600s
            kubectl rollout status deployment/mcp-server -n talentflow --timeout=600s
            kubectl get pods -n talentflow -o wide
